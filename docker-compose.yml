services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMPLIANCE_RUBRIC_PATH: /docs/compliance-rubric.json
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./docs:/docs

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMPLIANCE_RUBRIC_PATH: /docs/compliance-rubric.json
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./docs:/docs

volumes:
  redis_data:
