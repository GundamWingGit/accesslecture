# Production stack — CPU-only, all AI via Google Cloud APIs
# Usage: docker compose -f docker-compose.prod.yml up -d --build
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMPLIANCE_RUBRIC_PATH: /docs/compliance-rubric.json
    volumes:
      - ./backend/gcp-credentials.json:/app/gcp-credentials.json:ro
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      COMPLIANCE_RUBRIC_PATH: /docs/compliance-rubric.json
    volumes:
      - ./backend/gcp-credentials.json:/app/gcp-credentials.json:ro
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
